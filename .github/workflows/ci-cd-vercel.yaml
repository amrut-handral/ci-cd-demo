name: CI/CD Demo + Wiz CLI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Project
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  wiz-cli-iac-scan:
    name: Wiz-cli IaC Scan
    runs-on: ubuntu-latest

    env:
      SCAN_PATH: "."
      POLICY: "Default IaC policy"

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Run wiz CLI IaC scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: ./wizcli scan dir $SCAN_PATH --policies "$POLICY" --tags amrut=amrut
